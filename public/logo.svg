<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>LendTrack icon</title>
<desc>A rounded square badge with a green to blue gradient, containing a small white ledger notebook with spiral binding rings, a rupee symbol written on the page, two thin entry lines below it, and a folded page corner, representing a digital khata or credit notebook.</desc>
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#10B981"/>
    <stop offset="100%" stop-color="#3B82F6"/>
  </linearGradient>
</defs>

<rect x="8" y="8" width="184" height="184" rx="48" fill="url(#bg)"/>

<rect x="58" y="44" width="100" height="116" rx="10" fill="#FFFFFF" opacity="0.35"/>
<rect x="50" y="54" width="100" height="116" rx="10" fill="#FFFFFF"/>

<circle cx="62" cy="54" r="3.5" fill="#10B981"/>
<circle cx="79" cy="54" r="3.5" fill="#3B82F6"/>
<circle cx="96" cy="54" r="3.5" fill="#10B981"/>
<circle cx="113" cy="54" r="3.5" fill="#3B82F6"/>
<circle cx="130" cy="54" r="3.5" fill="#10B981"/>

<text x="100" y="130" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800" fill="url(#bg)" text-anchor="middle">₹</text>

<line x1="68" y1="148" x2="132" y2="148" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
<line x1="68" y1="160" x2="116" y2="160" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>

<path d="M150 54 L150 74 L130 54 Z" fill="#DCEFFF"/>
<line x1="130" y1="54" x2="150" y2="74" stroke="#93C5FD" stroke-width="1.5"/>
</svg>
